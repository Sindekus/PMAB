services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pmab-workshop-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Haslo123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Haslo123! -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: pmab-workshop-backend
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5203
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=WorkshopDb;User Id=sa;Password=Haslo123!;TrustServerCertificate=True"
    ports:
      - "5203:5203"

volumes:
  sqlserver_data:
